<template>

    <!-- KPI SECTION -->

    <div class="summary-container">

        <div class="summary-box">
            <div class="summary-label">STATUS CHANGES</div>
            <div class="summary-value">{statusChanges}</div>
        </div>

        <div class="summary-box">
            <div class="summary-label">OWNER CHANGES</div>
            <div class="summary-value">{ownerChanges}</div>
        </div>

        <div class="summary-box">
            <div class="summary-label">SOURCE CHANGES</div>
            <div class="summary-value">{sourceChanges}</div>
        </div>

        <div class="summary-box">
            <div class="summary-label">TOTAL AUDIT EVENTS</div>
            <div class="summary-value total-link">
                {totalEvents}
            </div>
        </div>

    </div>

    <!-- AUDIT TRAIL -->

    <section class="audit-card">

        <div class="audit-header">

            <div class="header-left">
                <lightning-icon
                    icon-name="utility:table"
                    size="x-small">
                </lightning-icon>

                <span class="header-title">
                    Recent Audit Trail
                </span>
            </div>

            <div class="header-right">
                {totalEvents} Events
            </div>

        </div>

        <div class="table-wrapper">

            <lightning-datatable
                key-field="id"
                data={auditRecords}
                columns={columns}
                hide-checkbox-column
                show-row-number-column>
            </lightning-datatable>

        </div>

        <div class="pagination">

            <span class="page-info">
                Page {pageNumber} of {totalPages}
            </span>

            <div class="button-group">

                <lightning-button
                    label="Previous"
                    onclick={handlePrevious}
                    disabled={disablePrevious}>
                </lightning-button>

                <lightning-button
                    label="Next"
                    onclick={handleNext}
                    disabled={disableNext}>
                </lightning-button>

            </div>

        </div>

    </section>

</template>
