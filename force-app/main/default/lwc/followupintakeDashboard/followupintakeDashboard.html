<template>
    <lightning-card>
         <div slot="title" class="card-header">

        <lightning-icon
            icon-name="standard:document"
            size="small"
            class="header-icon">
        </lightning-icon>

        <span>Follow-Up Leakage Reporting</span>

    </div>

        <div class="table-wrapper">

            <table class="custom-table">

                <thead>
                    <tr>
                        <th>INTAKE NAME</th>
                        <th>CREATED DATE</th>
                        <th>FOLLOW-UP STATUS</th>
                    </tr>
                </thead>

                <tbody>

                    <template for:each={intakes} for:item="i">

                        <tr key={i.id}>

                            <td>
                                <a
                                    data-id={i.id}
                                    onclick={openRecord}
                                    class="record-link">
                                    {i.name}
                                </a>
                            </td>

                            <td>
                                <lightning-formatted-date-time
                                    value={i.createdDate}
                                    year="numeric"
                                    month="short"
                                    day="2-digit">
                                </lightning-formatted-date-time>
                            </td>

                            <td>

                                <span class={i.statusClass}>
                                    {i.statusText}
                                </span>

                            </td>

                        </tr>

                    </template>

                </tbody>

            </table>

        </div>

        <!-- Pagination -->

        <div class="pagination">

            <span class="page-info">
                Page {pageNumber} of {totalPages}
            </span>

            <button
                class="page-button"
                onclick={prevPage}
                disabled={disablePrev}>

                ‹ Prev

            </button>

            <button
                class="page-button"
                onclick={nextPage}
                disabled={disableNext}>

                Next ›

            </button>

        </div>

    </lightning-card>
</template>
