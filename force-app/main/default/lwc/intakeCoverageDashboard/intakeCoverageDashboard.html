<template>
    <lightning-card>
            <div class="dashboard-header">
        <div class="header-title">
            <span class="header-icon">🌄</span>
            <span>24×7 After-Hours Coverage</span>
        </div>
    </div>


        <div class="coverage-dashboard">

            <!-- Metrics Grid -->
            <div class="metrics-grid">

                <div class="metric-cell">
                    <div class="metric-label">After-Hours Intakes</div>
                    <div class="metric-number">{afterHoursCount}</div>
                </div>

                <div class="metric-cell">
                    <div class="metric-label">Coverage Rate</div>
                    <div class="metric-number">{coverageRate}%</div>
                </div>

                <div class="metric-cell">
                    <div class="metric-label">Covered Within SLA</div>
                    <div class="metric-number">{coveredCount}</div>
                </div>

                <div class="metric-cell">
                    <div class="metric-label">Missed Opportunities</div>
                    <div class="metric-number">{missedCount}</div>
                </div>

            </div>

            <!-- Covered -->
            <div class="progress-section">

                <div class="progress-header">
                    <span>Responded Within 30 Min</span>
                    <span>{coverageRate}%</span>
                </div>

                <div class="progress-bg">
                    <div
                        class="covered-bar"
                        style={coveredStyle}>
                    </div>
                </div>

            </div>

            <!-- Missed -->
            <div class="progress-section">

                <div class="progress-header">
                    <span>Missed</span>
                    <span>{missedPercent}%</span>
                </div>

                <div class="progress-bg">
                    <div
                        class="missed-bar"
                        style={missedStyle}>
                    </div>
                </div>

            </div>

            <!-- Warning Box -->
            <template if:true={showWarning}>
                <div class="warning-box">
                    ⚠ 100% of after-hours leads are missed.
                    Consider an answering service or on-call rotation.
                </div>
            </template>

        </div>

    </lightning-card>
</template>
