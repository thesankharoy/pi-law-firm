<template>
    <lightning-card class="ai-card">

        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <div class="icon-tile">⚡</div>
                <h2 class="title">AI Recommended Actions</h2>
            </div>
            <template if:false={isLoading}>
                <div class="count">{actionCount}</div>
            </template>
        </div>

        <!-- LOADING -->
        <template if:true={isLoading}>
            <div class="loading-section">
                <lightning-spinner size="small" alternative-text="Analyzing"></lightning-spinner>
                <span>AI analyzing case behavior...</span>
            </div>
        </template>

        <!-- ACTION LIST -->
        <template if:false={isLoading}>
            <ul class="action-list">
                <template for:each={actions} for:item="a">
                    <li key={a.id} class="action-item">

                        <div class="action-head" data-index={a.index} onclick={handleToggle}>
                            <span class={a.badgeClass}>{a.priority}</span>
                            <span class="action-title">{a.title}</span>
                            <lightning-icon
                                icon-name={a.chevron}
                                size="xx-small"
                                class="chevron">
                            </lightning-icon>
                        </div>

                        <template if:true={a.expanded}>
                            <div class="action-body">{a.description}</div>
                        </template>

                    </li>
                </template>
            </ul>
        </template>

    </lightning-card>
</template>
