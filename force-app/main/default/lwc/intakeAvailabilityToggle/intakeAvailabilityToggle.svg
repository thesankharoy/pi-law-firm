<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

    <!-- Background pill -->
    <rect width="100" height="100" rx="22" fill="#0f1f3d" />

    <!-- Pulse ring behind person -->
    <circle cx="50" cy="33" r="18" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.35" />

    <!-- Person head -->
    <circle cx="50" cy="31" r="10" fill="#60a5fa" />

    <!-- Person shoulders -->
    <path d="M28 58 Q28 46 50 46 Q72 46 72 58" fill="#2563eb" />

    <!-- Intake tray base -->
    <rect x="18" y="62" width="64" height="24" rx="7" fill="#1e3a5f" />

    <!-- Three intake lines (documents in tray) -->
    <rect x="26" y="68" width="28" height="3.5" rx="1.75" fill="#60a5fa" />
    <rect x="26" y="74" width="38" height="3.5" rx="1.75" fill="#3b82f6" opacity="0.75" />
    <rect x="26" y="80" width="20" height="3.5" rx="1.75" fill="#2563eb" opacity="0.55" />

    <!-- Active green dot — specialist is online -->
    <circle cx="74" cy="65" r="6" fill="#0f1f3d" />
    <circle cx="74" cy="65" r="4.5" fill="#22c55e" />
    <circle cx="74" cy="65" r="2.5" fill="#bbf7d0" />

</svg>