<template>
    <lightning-card class="ai-card">

        <!-- Header -->
        <div class="header">

            <div class="header-left">
                <div class="icon-tile">🤖</div>
                <div class="title-wrap">
                    <span class="title">AI Conversation Intelligence</span>
                    <span class="subtitle">Real-time case understanding</span>
                </div>
            </div>

            <div class="header-actions">
                <div class="ready-badge">
                    <span class="ready-dot"></span>
                    READY
                </div>
                <lightning-button
                    variant="neutral"
                    label="Refresh"
                    icon-name="utility:refresh"
                    class="refresh-btn"
                    onclick={generateSummary}>
                </lightning-button>
            </div>

        </div>

        <!-- Loading -->
        <template if:true={loading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:false={loading}>

            <!-- Content -->
            <template if:true={hasSummary}>
                <div class="content">

                    <!-- Sentiment -->
                    <div class={sentimentBannerClass}>
                        <div class="banner-label">Client Sentiment</div>
                        <div class="banner-value">{sentiment}</div>
                    </div>

                    <!-- Conversation Summary -->
                    <div class="insight-block">
                        <div class="insight-header">
                            <lightning-icon icon-name="utility:list" size="x-small" class="head-icon"></lightning-icon>
                            <span class="head-title">Conversation Summary</span>
                        </div>
                        <div class="insight-body">
                            <lightning-formatted-rich-text value={summary}></lightning-formatted-rich-text>
                        </div>
                    </div>

                    <!-- Recommended Action -->
                    <div class="insight-block">
                        <div class="insight-header">
                            <lightning-icon icon-name="utility:list" size="x-small" class="head-icon"></lightning-icon>
                            <span class="head-title">Recommended Action</span>
                        </div>
                        <div class="insight-body">
                            <lightning-formatted-rich-text value={recommendedAction}></lightning-formatted-rich-text>
                        </div>
                    </div>

                    <!-- Suggested Next Message -->
                    <div class="insight-block">
                        <div class="insight-header">
                            <lightning-icon icon-name="utility:chat" size="x-small" class="head-icon"></lightning-icon>
                            <span class="head-title">Suggested Next Message</span>
                            <lightning-button-icon
                                icon-name="utility:copy"
                                variant="border"
                                size="small"
                                alternative-text="Copy"
                                class="copy-btn"
                                onclick={copyMessage}>
                            </lightning-button-icon>
                        </div>
                        <div class="message-box">
                            <lightning-formatted-rich-text value={nextMessage}></lightning-formatted-rich-text>
                        </div>
                    </div>

                </div>
            </template>

            <!-- Empty -->
            <template if:false={hasSummary}>
                <div class="empty-state">
                    <lightning-icon icon-name="utility:einstein" size="large"></lightning-icon>
                    <div class="empty-title">No AI Summary Available</div>
                    <div class="empty-description">
                        Generate an AI summary from the Twilio conversation history.
                    </div>
                </div>
            </template>

        </template>

    </lightning-card>
</template>
