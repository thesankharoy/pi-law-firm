<template>
    <lightning-card class="ai-card">

        <!-- Header -->
        <div class="header">

            <div class="header-left">

                <div class="icon-tile">
                    <lightning-icon
                        icon-name="utility:einstein"
                        size="small"
                        class="einstein-icon">
                    </lightning-icon>
                </div>

                <h2 class="title">AI Lead Analysis</h2>

            </div>

            <div class="live-badge">
                <span class="live-dot"></span>
                LIVE
            </div>

        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="loading-section">
                <lightning-spinner
                    size="small"
                    alternative-text="Analyzing">
                </lightning-spinner>
                <div class="loading-text">Analyzing conversation...</div>
            </div>
        </template>

        <template if:false={isLoading}>

            <!-- Score -->
            <div class="score-row">

                <div class="gauge-wrap">
                    <svg viewBox="0 0 36 36" class="gauge" xmlns="http://www.w3.org/2000/svg">
                        <path class="gauge-track"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831">
                        </path>
                        <path class={gaugeArcClass} style={gaugeStyle}
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831">
                        </path>
                    </svg>
                    <div class="gauge-center">
                        <span class="gauge-num">{confidence}</span>
                        <span class="gauge-den">/100</span>
                    </div>
                </div>

                <div class="score-meta">

                    <div class="score-title">Lead Qualification Score</div>
                    <div class="score-sub">{conversionLikelihood} &middot; Updated just now</div>

                    <div class="insights">
                        <span class={tempChipClass}>{leadTemperature}</span>
                        <span class="chip chip-ai">AI Generated</span>
                        <template if:true={showLiability}>
                            <span class="chip chip-liability">High Liability</span>
                        </template>
                    </div>

                </div>

            </div>

            <!-- Insights -->
            <div class="content">
                <ul class="bullets">
                    <template for:each={insights} for:item="item">
                        <li key={item.id} class="bullet">
                            <span class={item.dotClass}></span>
                            <span class="bullet-text">{item.text}</span>
                        </li>
                    </template>
                </ul>
            </div>

        </template>

    </lightning-card>
</template>
