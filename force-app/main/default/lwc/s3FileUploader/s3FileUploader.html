<template>
    <!-- Documents Section -->
    <div class="document-card">
        <div class="section-header">
            <lightning-icon icon-name="doctype:attachment" size="xx-small" class="header-icon"> </lightning-icon>

            <span>Documents</span>
        </div>

        <div class="content-area">
            <h3 class="upload-title">Upload Document to S3</h3>

            <div class="field-label">Select File</div>

            <!-- Upload Area -->
            <div class="upload-box">
                <lightning-input type="file" variant="label-hidden" onchange={handleFileChange}> </lightning-input>

                <template if:true={selectedFileName}>
                    <div class="selected-file">{selectedFileName}</div>
                </template>
            </div>

            <!-- Upload Button -->
            <div class="button-row">
                <lightning-button variant="brand" label="Upload" onclick={uploadFile} disabled={disableUpload}>
                </lightning-button>
            </div>

            <template if:true={isLoading}>
                <div class="spinner-container">
                    <lightning-spinner size="small" alternative-text="Uploading"> </lightning-spinner>
                </div>
            </template>

            <template if:true={uploadedUrl}>
                <div class="uploaded-link">
                    <a href={uploadedUrl} target="_blank"> Open File </a>
                </div>
            </template>

            <!-- Uploaded Documents -->
            <div class="documents-title">Uploaded Documents</div>

            <div class="document-list">
                <template if:true={hasDocuments}>
                    <template for:each={documents} for:item="doc">
                        <div key={doc.Id} class="document-row">
                            <div class="doc-name">{doc.Name}</div>

                            <div class="actions">
                                <lightning-button
                                    label="View"
                                    variant="neutral"
                                    data-url={doc.File_URL__c}
                                    onclick={handleView}
                                >
                                </lightning-button>

                                <lightning-button
                                    label="Delete"
                                    variant="destructive"
                                    data-id={doc.Id}
                                    onclick={handleDelete}
                                >
                                </lightning-button>
                            </div>
                        </div>
                    </template>
                </template>

                <template if:false={hasDocuments}>
                    <div class="empty-state">No documents found.</div>
                </template>
            </div>
        </div>
    </div>
</template>
