<template>
    <lightning-card title="Upload Document to S3">

        <div class="slds-p-around_medium">

            <lightning-input
                type="file"
                label="Select File"
                onchange={handleFileChange}>
            </lightning-input>

            <br/>

            <lightning-button
                variant="brand"
                label="Upload"
                onclick={uploadFile}
                disabled={disableUpload}>
            </lightning-button>

            <template if:true={isLoading}>
                <div class="slds-m-top_medium">
                    <lightning-spinner
                        alternative-text="Uploading">
                    </lightning-spinner>
                </div>
            </template>

            <template if:true={uploadedUrl}>
                <div class="slds-m-top_medium">
                    <p>
                        <strong>Uploaded File:</strong>
                    </p>

                    <a
                        href={uploadedUrl}
                        target="_blank">
                        Open File
                    </a>
                </div>
            </template>

        </div>

    </lightning-card>


    <lightning-card title="Uploaded Documents">

    <div class="slds-p-around_medium">

        <template if:true={hasDocuments}>

            <template
                for:each={documents}
                for:item="doc">

                <div
                    key={doc.Id}
                    class="slds-box slds-m-bottom_small">

                    <div
                        class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">

                        <div>

                            <strong>
                                {doc.Name}
                            </strong>

                        </div>

                        <div>

                            <lightning-button
                                label="View"
                                variant="brand-outline"
                                data-url={doc.File_URL__c}
                                onclick={handleView}>
                            </lightning-button>

                            <lightning-button
                                class="slds-m-left_small"
                                label="Delete"
                                variant="destructive"
                                data-id={doc.Id}
                                onclick={handleDelete}>
                            </lightning-button>

                        </div>

                    </div>

                </div>

            </template>

        </template>

        <template if:false={hasDocuments}>

            <p>No documents found.</p>

        </template>

    </div>

</lightning-card>
</template>
