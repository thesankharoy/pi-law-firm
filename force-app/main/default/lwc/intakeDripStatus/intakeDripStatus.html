<template>
    <div class="ids-root">
        <template if:true={isLoading}>
            <div class="ids-loading">
                <lightning-spinner size="small" alternative-text="Loading"></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <!-- NOT ENROLLED -->
            <template if:false={enrollment.isEnrolled}>
                <div class="ids-card ids-card-empty">
                    <div class="ids-empty-icon">
                        <svg viewBox="0 0 40 40" width="40" height="40" fill="none">
                            <circle cx="20" cy="20" r="19" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="5 3" />
                            <path d="M14 20h12M20 14v12" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" />
                        </svg>
                    </div>
                    <div class="ids-empty-text">
                        <div class="ids-empty-title">No drip campaign active</div>
                        <div class="ids-empty-desc">
                            Defer this lead manually below, or take no action — if it later reaches Dead status, it
                            joins the active re-activation campaign automatically.
                        </div>
                    </div>
                    <button class="ids-defer-btn" onclick={handleOpenDeferModal}>
                        <svg viewBox="0 0 14 14" width="12" height="12" fill="none">
                            <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3" />
                            <path
                                d="M7 4.5v3l1.5 1.5"
                                stroke="currentColor"
                                stroke-width="1.3"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            />
                        </svg>
                        Defer Lead
                    </button>
                </div>
            </template>

            <!-- DEFERRED ENROLLMENT -->
            <template if:true={isDeferredEnrollment}>
                <div class="ids-card ids-card-deferred">
                    <div class="ids-card-header">
                        <span class="enroll-type-badge badge-deferred">
                            <svg viewBox="0 0 12 12" width="10" height="10" fill="none">
                                <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2" />
                                <path
                                    d="M6 3.5v2.8l1.5 1.5"
                                    stroke="currentColor"
                                    stroke-width="1.2"
                                    stroke-linecap="round"
                                />
                            </svg>
                            Deferred
                        </span>
                        <span class="enroll-mode-tag">You chose this</span>
                    </div>

                    <div class="enroll-campaign-name-row">Campaign: <strong>{enrollment.campaignName}</strong></div>

                    <div class="ids-reactivate-info">
                        <div class="reactivate-date-label">Re-activates on</div>
                        <div class="reactivate-date-value">{enrollment.reactivateLabel}</div>
                        <div class="reactivate-countdown">{deferredCountdownLabel}</div>
                    </div>

                    <div class="ids-card-footer">
                        <span class="enrolled-since">Enrolled {enrollment.enrolledAt}</span>
                        <button class="ids-cancel-btn" onclick={handleCancelEnrollment}>Cancel deferral</button>
                    </div>
                </div>
            </template>

            <!-- RE-ACTIVATION ENROLLMENT -->
            <template if:true={isReactivationEnrollment}>
                <div class="ids-card ids-card-reactivation">
                    <div class="ids-card-header">
                        <span class="enroll-type-badge badge-reactivation">
                            <svg viewBox="0 0 12 12" width="10" height="10" fill="none">
                                <path
                                    d="M10 2v3H7"
                                    stroke="currentColor"
                                    stroke-width="1.2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                />
                                <path
                                    d="M1.5 6A4.5 4.5 0 009 3.5"
                                    stroke="currentColor"
                                    stroke-width="1.2"
                                    stroke-linecap="round"
                                />
                            </svg>
                            Re-activation
                        </span>
                        <span class="enroll-mode-tag enroll-mode-auto">Automatic — this lead went Dead</span>
                    </div>

                    <div class="enroll-campaign-name-row">Campaign: <strong>{enrollment.campaignName}</strong></div>

                    <div class="ids-progress-wrap">
                        <div class="ids-progress-track">
                            <div class="ids-progress-fill" style={progressBarStyle}></div>
                        </div>
                        <div class="ids-progress-labels">
                            <span>Day {enrollment.daysElapsed}</span>
                            <span>{enrollment.progressPct}%</span>
                            <span>Day {enrollment.totalDays}</span>
                        </div>
                    </div>

                    <div class="ids-card-footer">
                        <span class="enrolled-since">Started {enrollment.enrolledAt}</span>
                        <button class="ids-cancel-btn" onclick={handleCancelEnrollment}>Cancel campaign</button>
                    </div>
                </div>
            </template>
        </template>

        <!-- DEFER MODAL -->
        <template if:true={showDeferModal}>
            <div class="modal-backdrop" onclick={closeDeferModal}>
                <div class="modal modal-lg" onclick={stopProp}>
                    <div class="modal-header">
                        <h2 class="modal-title">Defer Lead</h2>
                        <button class="modal-close-btn" onclick={closeDeferModal}>
                            <svg viewBox="0 0 14 14" width="14" height="14" fill="none">
                                <path
                                    d="M2 2l10 10M12 2L2 12"
                                    stroke="currentColor"
                                    stroke-width="1.5"
                                    stroke-linecap="round"
                                />
                            </svg>
                        </button>
                    </div>
                    <div class="modal-body">
                        <p class="defer-intro">
                            Choose which Deferred campaign to enroll this lead in, then pick the date it should wake up.
                            On that date, the campaign's configured steps run automatically.
                        </p>

                        <div class="defer-step-label">
                            <span class="defer-step-number">1</span>
                            Choose Campaign
                        </div>

                        <template if:true={isCampaignsLoading}>
                            <div class="preview-loading">
                                <lightning-spinner size="x-small" alternative-text="Loading"></lightning-spinner>
                                Loading active campaigns…
                            </div>
                        </template>

                        <template if:false={isCampaignsLoading}>
                            <template if:true={hasActiveCampaigns}>
                                <div class="campaign-select-list">
                                    <template for:each={enrichedCampaigns} for:item="c">
                                        <div
                                            key={c.id}
                                            class={c.cardClass}
                                            data-id={c.id}
                                            onclick={handleSelectCampaign}
                                        >
                                            <div class="campaign-select-top">
                                                <span class="campaign-select-name">{c.name}</span>
                                                <span class="campaign-select-steps">{c.stepCount} steps</span>
                                                <template if:true={c.isSelected}>
                                                    <svg
                                                        viewBox="0 0 16 16"
                                                        width="15"
                                                        height="15"
                                                        fill="none"
                                                        class="campaign-select-check"
                                                    >
                                                        <circle cx="8" cy="8" r="7" fill="#2563eb" />
                                                        <path
                                                            d="M5 8l2 2 4-4"
                                                            stroke="#fff"
                                                            stroke-width="1.6"
                                                            stroke-linecap="round"
                                                            stroke-linejoin="round"
                                                        />
                                                    </svg>
                                                </template>
                                            </div>
                                            <template if:true={c.description}>
                                                <div class="campaign-select-desc">{c.description}</div>
                                            </template>

                                            <template if:true={c.isSelected}>
                                                <template if:true={c.hasSteps}>
                                                    <div class="campaign-select-preview">
                                                        <template for:each={c.steps} for:item="s">
                                                            <div key={s.previewKey} class="preview-step-row">
                                                                <span class="preview-step-day">Day {s.dayNumber}</span>
                                                                <span class="preview-step-icon">{s.icon}</span>
                                                                <span class="preview-step-label">{s.label}</span>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                                <template if:false={c.hasSteps}>
                                                    <div class="preview-no-steps">
                                                        No steps configured — a fallback task will be created instead.
                                                    </div>
                                                </template>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <template if:false={hasActiveCampaigns}>
                                <div class="no-campaign-warning">
                                    <svg viewBox="0 0 14 14" width="13" height="13" fill="none">
                                        <path
                                            d="M7 1L13 12H1L7 1z"
                                            stroke="#dc2626"
                                            stroke-width="1.3"
                                            stroke-linejoin="round"
                                        />
                                        <path
                                            d="M7 5.5v3M7 10v.5"
                                            stroke="#dc2626"
                                            stroke-width="1.3"
                                            stroke-linecap="round"
                                        />
                                    </svg>
                                    No active Deferred campaigns found. Ask your admin to activate one in Firm Settings
                                    → Drip Campaigns.
                                </div>
                            </template>
                        </template>

                        <div class="defer-step-label">
                            <span class="defer-step-number">2</span>
                            Choose Wake-up Date
                        </div>

                        <div class="field-group">
                            <label class="field-label">Quick select</label>
                            <div class="quick-chips">
                                <button class="chip" data-days="7" onclick={handleQuickSelect}>1 Week</button>
                                <button class="chip" data-days="14" onclick={handleQuickSelect}>2 Weeks</button>
                                <button class="chip" data-days="28" onclick={handleQuickSelect}>4 Weeks</button>
                                <button class="chip" data-days="42" onclick={handleQuickSelect}>6 Weeks</button>
                                <button class="chip" data-days="60" onclick={handleQuickSelect}>2 Months</button>
                            </div>
                        </div>

                        <div class="field-group">
                            <label class="field-label">Or pick a specific date</label>
                            <input
                                class="field-input"
                                type="date"
                                value={deferDate}
                                min={todayIso}
                                onchange={handleDeferDateChange}
                            />
                        </div>

                        <template if:true={deferDate}>
                            <div class="defer-summary">
                                <svg viewBox="0 0 14 14" width="12" height="12" fill="none">
                                    <circle cx="7" cy="7" r="5.5" stroke="#16a34a" stroke-width="1.2" />
                                    <path
                                        d="M4.5 7l2 2 3-3"
                                        stroke="#16a34a"
                                        stroke-width="1.3"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                    />
                                </svg>
                                Will re-activate on {deferDateLabel}
                            </div>
                        </template>

                        <template if:true={deferError}>
                            <div class="form-error">{deferError}</div>
                        </template>
                    </div>
                    <div class="modal-footer">
                        <button class="btn-secondary" onclick={closeDeferModal}>Cancel</button>
                        <button class="btn-primary" onclick={handleConfirmDefer} disabled={confirmDeferDisabled}>
                            <template if:false={isDeferring}>Defer Lead</template>
                            <template if:true={isDeferring}>
                                <lightning-spinner size="x-small" alternative-text="Deferring"></lightning-spinner>
                                Deferring…
                            </template>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
