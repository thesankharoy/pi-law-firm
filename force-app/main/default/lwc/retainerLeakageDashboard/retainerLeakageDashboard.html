<template>

    <div class="dashboard-grid">

        <div class="metric-card sent">

            <lightning-icon
                icon-name="utility:send"
                size="large">
            </lightning-icon>

            <div class="metric-value">
                {sentCount}
            </div>

            <div class="metric-title">
                Retainers Sent
            </div>

        </div>

        <div class="metric-card signed">

            <lightning-icon
                icon-name="utility:success"
                size="large">
            </lightning-icon>

            <div class="metric-value">
                {signedCount}
            </div>

            <div class="metric-title">
                Retainers Signed
            </div>

        </div>

        <div class="metric-card unsigned">

            <lightning-icon
                icon-name="utility:warning"
                size="large">
            </lightning-icon>

            <div class="metric-value">
                {unsignedCount}
            </div>

            <div class="metric-title">
                Unsigned Retainers
            </div>

        </div>

        <div class="metric-card leakage">

            <lightning-icon
                icon-name="utility:trend_down"
                size="large">
            </lightning-icon>

            <div class="metric-value">
                {leakageRate}%
            </div>

            <div class="metric-title">
                Leakage Rate
            </div>

        </div>

    </div>

    <lightning-card
        title="Retainer Leakage Analysis">

        <div class="analysis-container">

            <div class="analysis-row">

                <div class="label">
                    Signed Retainers
                </div>

                <div class="bar-bg">

                    <div
                        class="signed-bar"
                        style={signedWidth}>
                    </div>

                </div>

                <div class="value">

                    {signedPercent}%

                </div>

            </div>

            <div class="analysis-row">

                <div class="label">
                    Unsigned Retainers
                </div>

                <div class="bar-bg">

                    <div
                        class="unsigned-bar"
                        style={unsignedWidth}>
                    </div>

                </div>

                <div class="value">

                    {leakageRate}%

                </div>

            </div>

        </div>

    </lightning-card>

</template>
