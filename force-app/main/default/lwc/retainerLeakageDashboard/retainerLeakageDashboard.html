<template>
    <lightning-card>

        <div class="retainer-card">

            <!-- Header -->
            <div class="card-header">
                <span class="icon">🎉</span>
                <span class="title">Retainer Leakage Dashboards</span>
            </div>

            <!-- Signed -->
            <div class="status-row">

                <div class="status-label">
                    <span class="dot green"></span>
                    Signed Retainers
                </div>

                <div class="progress-track">
                    <div class="progress-fill green-fill"
                         style={signedWidth}>
                    </div>
                </div>

                <div class="status-value success-text">
                    {signedCount} ({signedPercent}%)
                </div>

            </div>

            <!-- Unsigned -->
            <div class="status-row">

                <div class="status-label">
                    <span class="dot red"></span>
                    Unsigned Retainers
                </div>

                <div class="progress-track">
                    <div class="progress-fill red-fill"
                         style={unsignedWidth}>
                    </div>
                </div>

                <div class="status-value danger-text">
                    {unsignedCount} ({leakageRate}%)
                </div>

            </div>

        </div>

    </lightning-card>
</template>
