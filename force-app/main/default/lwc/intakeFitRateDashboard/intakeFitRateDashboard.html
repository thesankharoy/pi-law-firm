<template>

    <div class="dashboard-grid">

        <!-- Intake Fit Rate -->
        <lightning-card>
            <div class="card-header">
            <span class="icon">🎯</span>
            <span class="title">Intake Case Quality Rate by Source</span>
        </div>

            <div class="fit-container">

                <template for:each={fitRateData} for:item="item">

                    <div key={item.source} class="fit-row">

                        <div class="fit-header">

                            <span class="source">
                                {item.source}
                            </span>

                            <span class="fit-rate">
                                Avg {item.qualityRate}
                            </span>

                        </div>

                        <div class="progress-container">

                            <div
                                class="fit-progress-bar"
                                style={item.widthStyle}>
                            </div>

                        </div>

                        <div class="fit-detail">
                            {item.totalIntakes}
                            Intakes
                        </div>

                    </div>

                </template>

            </div>

        </lightning-card>

        <!-- Signed Conversion -->
        <lightning-card>
            <div class="card-header">
                <span class="icon">🔄</span>
                <span class="title">Intake-to-Signed Conversion by Source</span>
            </div>

            <div class="conversion-container">

                <template
                    for:each={conversionData}
                    for:item="item">

                    <div
                        key={item.source}
                        class="fit-row">

                        <div class="fit-header">

                            <span class="source">
                                {item.source}
                            </span>

                            <span class="conversion-rate">
                                Avg {item.conversionRate}
                            </span>

                        </div>

                        <div class="progress-container">

                            <div
                                class="conversion-progress-bar"
                                style={item.widthStyle}>
                            </div>

                        </div>

                        <div class="fit-detail">

                            {item.signedClients}
                            Signed of
                            {item.totalIntakes}
                            Intakes

                        </div>

                    </div>

                </template>

            </div>

        </lightning-card>

    </div>

</template>
