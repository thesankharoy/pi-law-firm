<template>
    <lightning-card>
        <div slot="title" class="card-title">
            <span class="emoji-icon">📋</span>
            <span>Follow-Up Compliance</span>
        </div>

        <div class="compliance-container">

            <div class="task-count">
                {total} total tasks
            </div>

            <div class="stats-grid">

                <!-- Total -->
                <div class="stat-box"
                     data-type="total"
                     onclick={openTaskList}>
                    <div class="label">Total Tasks</div>
                    <div class="value total">{total}</div>
                </div>

                <!-- Completed -->
                <div class="stat-box"
                     data-type="completed"
                     onclick={openTaskList}>
                    <div class="label">Completed</div>
                    <div class="value completed">{completed}</div>
                </div>

                <!-- Pending -->
                <div class="stat-box"
                     data-type="pending"
                     onclick={openTaskList}>
                    <div class="label">Pending</div>
                    <div class="value pending">{pending}</div>
                </div>

            </div>

            <div class="progress-section">

                <div class="progress-header">
                    <span>Completion rate</span>
                    <span class="percentage">{completionPercentage}%</span>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" style={progressStyle}></div>
                </div>

            </div>

        </div>

    </lightning-card>
</template>
