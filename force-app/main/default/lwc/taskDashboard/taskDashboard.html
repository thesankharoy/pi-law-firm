<template>
    <lightning-card title="Follow-Up Compliance" icon-name="standard:task">

        <div class="container">

            <!-- Summary Cards -->
            <div class="summary">

               <div class="card blue" onclick={openTaskList}>
                    <p>Total Tasks</p>
                    <h2>{total}</h2>
                </div>

                <div class="card green" onclick={openTaskList}>
                    <p>Completed</p>
                    <h2>{completed}</h2>
                </div>

                <div class="card red" onclick={openTaskList}>
                    <p>Pending</p>
                    <h2>{pending}</h2>
                </div>

            </div>

        </div>

    </lightning-card>
</template>
